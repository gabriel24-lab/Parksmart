<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <script src="api.js"></script>
</head>
<body>
  <div class="background">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div class="card">
    <div class="logo">Logo</div>

    <h1 class="title">Crear cuenta</h1>
    <p class="subtitle">Solo necesitas estos datos para comenzar</p>

    <div class="form-group">
      <label for="fullname">Nombre completo</label>
      <div class="input-wrapper">
        <i class="bi bi-person input-icon"></i>
        <input type="text" id="fullname" placeholder="Ej: Juan David Pérez" />
      </div>
    </div>

    <div class="form-group">
      <label for="identificacion">Número de identificación</label>
      <div class="input-wrapper">
        <i class="bi bi-card-text input-icon"></i>
        <input type="text" id="identificacion" placeholder="Ej: 1001234567" />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrapper password-wrapper">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
        <span class="eye-icon" onclick="togglePassword('password', 'eye1')">
          <i id="eye1" class="bi bi-eye"></i>
        </span>
      </div>
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirmar contraseña</label>
      <div class="input-wrapper password-wrapper">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" id="confirm-password" placeholder="Repite tu contraseña" />
        <span class="eye-icon" onclick="togglePassword('confirm-password', 'eye2')">
          <i id="eye2" class="bi bi-eye"></i>
        </span>
      </div>
    </div>

    <p id="reg-error"   style="display:none;color:#ffb3b3;font-size:13px;text-align:center;margin-top:-10px;margin-bottom:8px;"></p>
    <p id="reg-success" style="display:none;color:#a5d6a7;font-size:13px;text-align:center;margin-top:-10px;margin-bottom:8px;"></p>

    <button class="btn-register" onclick="handleRegister()">Crear cuenta</button>

    <p class="login-text">Ya tienes una cuenta? <a href="login.html">Inicia sesion</a></p>
  </div>

  <script>
    if (Auth.isLogged()) window.location.href = 'dashboard.html';

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    }

    async function handleRegister() {
      const nombre   = document.getElementById('fullname').value.trim();
      const numId    = document.getElementById('identificacion').value.trim();
      const pass     = document.getElementById('password').value;
      const passConf = document.getElementById('confirm-password').value;

      const errEl = document.getElementById('reg-error');
      const okEl  = document.getElementById('reg-success');
      const btn   = document.querySelector('.btn-register');

      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      if (!nombre || !numId || !pass || !passConf) {
        errEl.textContent   = 'Por favor completa todos los campos.';
        errEl.style.display = 'block'; return;
      }
      if (pass !== passConf) {
        errEl.textContent   = 'Las contraseñas no coinciden.';
        errEl.style.display = 'block'; return;
      }
      if (pass.length < 8) {
        errEl.textContent   = 'La contraseña debe tener al menos 8 caracteres.';
        errEl.style.display = 'block'; return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creando cuenta...';

      try {
        let data;
        try {
          data = await apiPost('/auth/register', {
            nombre_completo: nombre,
            numero_id:       numId,
            password:        pass,
          });
        } catch (fetchErr) {
          // El servidor no responde o no está corriendo
          errEl.textContent   = 'No se pudo conectar al servidor. Verifica que el backend esté corriendo en http://localhost:3000';
          errEl.style.display = 'block';
          return;
        }

        if (!data) {
          errEl.textContent   = 'El servidor no devolvió respuesta.';
          errEl.style.display = 'block';
          return;
        }

        if (!data.ok) {
          // Mostrar el error exacto que devuelve el servidor
          const msg = data.message
            || (data.errors && data.errors.map(e => e.msg).join(', '))
            || 'Error al registrar.';
          errEl.textContent   = msg;
          errEl.style.display = 'block';
          return;
        }

        okEl.textContent   = '¡Cuenta creada! Redirigiendo al login...';
        okEl.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1800);

      } finally {
        btn.disabled    = false;
        btn.textContent = 'Crear cuenta';
      }
    }
  </script>
</body>
</html>
