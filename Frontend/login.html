<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio sesion - Parksmart</title>

  <!-- Preconnect a dominios externos para acelerar carga -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://parksmart-ggt8.onrender.com">

  <!-- CSS propio primero (crítico) -->
  <link rel="stylesheet" href="login.css" />

  <!-- Google Fonts en modo no bloqueante -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap"></noscript>

  <!-- Bootstrap Icons en modo no bloqueante -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></noscript>

  <!-- api.js diferido para no bloquear renderizado -->
  <script src="api.js" defer></script>

  <!-- Favicon -->
  <link rel="icon" href="/Frontend/img/logo-icon-cropped.webp" type="image/webp">
</head>
<body>
  <div class="background"></div>

  <div class="card">
    <div class="logo">
      <!-- width y height explícitos para evitar CLS -->
      <img src="/Frontend/img/logotipo-full-cropped.webp" alt="Parksmart Logo" width="180" height="60" fetchpriority="high"/>
    </div>

    <h1 class="title">Inicia sesion</h1>

    <div class="form-group">
      <label for="numero_id">Número de identificacion</label>
      <input type="text" id="numero_id" placeholder="123343333" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password"/>
        <span class="eye-icon" onclick="togglePassword()">
          <i id="eye-icon" class="bi bi-eye"></i>
        </span>
      </div>
    </div>

    <div class="forgot">
      <a href="recuperar.html">Olvido su contraseña?</a>
    </div>

    <button class="btn-signin" onclick="handleLogin()">Inicia sesion</button>

    <p id="login-error" style="display:none;color:#ffb3b3;font-size:13px;text-align:center;margin-top:-10px;margin-bottom:8px;"></p>

    <p class="register-text">No tienes una cuenta? <a href="register.html">Registrate</a></p>
  </div>

  <!-- bg-animation al final y diferido para no bloquear -->
  <script src="bg-animation.js" defer></script>

  <script>
    // Esperar a que api.js cargue antes de ejecutar
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && Auth.isLogged()) {
        window.location.href = 'dashboard.html';
      }
    });

    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    }

    async function handleLogin() {
      const numero_id = document.getElementById('numero_id').value.trim();
      const password  = document.getElementById('password').value;
      const errEl     = document.getElementById('login-error');
      const btn       = document.querySelector('.btn-signin');

      errEl.style.display = 'none';

      if (!numero_id || !password) {
        errEl.textContent   = 'Por favor completa todos los campos.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Ingresando...';

      try {
        const data = await apiPost('/auth/login', { numero_id, password });

        if (!data.ok) {
          errEl.textContent   = data.message || 'Credenciales incorrectas.';
          errEl.style.display = 'block';
          return;
        }

        Auth.save(data);
        window.location.href = data.user.rol === 'admin' ? 'admin.html' : 'dashboard.html';

      } catch {
        errEl.textContent   = 'No se pudo conectar al servidor.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Inicia sesion';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
