services:
  - type: web
    name: parqueadero-api
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: https://parksmart-ggt8.onrender.com          # Lo pegas manualmente en el dashboard de Render
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false          # URL de Vercel, la pegas después de desplegar el frontend
      - key: PORT
        value: 10000
      - key: MAX_FILE_SIZE
        value: "5242880"
